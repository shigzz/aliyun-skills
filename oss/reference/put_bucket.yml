public-read-write：公共读写
public-read：公共读
private（默认）：私有",
description: "指定Bucket的访问权限ACL。包含如下三种访问权限：

- public-read-write：公共读写

- public-read：公共读

- private：私有（默认值）

关于Bucket访问权限ACL的更多信息，请参见[设置存储空间访问权限ACL](~~31843~~)。",
