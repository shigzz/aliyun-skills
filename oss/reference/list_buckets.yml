in: "query",
schema: {
title: "指定Bucket标签键。列举结果中仅会包含那些打上了对应标签的Bucket。",
description: "指定Bucket标签键。列举结果中仅会包含那些打上了对应标签的Bucket。",
type: "string",
required: false,
example: "test-key"
}
},
{
name: "tag-value",
in: "query",
schema: {
title: "指定Bucket标签值。如果请求指定了该参数，那么必须同时指定tag-value，列举结果中仅会包含那些打上了对应标签键值对的Bucket。",
description: "指定Bucket标签值。如果请求指定了该参数，那么必须同时指定tag-value，列举结果中仅会包含那些打上了对应标签键值对的Bucket。",
type: "string",
required: false,
example: "test-value"
}
},
{
name: "tagging",
in: "query",
schema: {
title: "指定标签列表。如："k1":"v1","k2":"v2"，只有Bucket匹配列表中所有的标签键值对，才会出现在列举结果中。
tagging参数与tag-key和tag-value两个参数不能同时存在。",
description: "指定标签列表。如："k1":"v1","k2":"v2"，只有Bucket匹配列表中所有的标签键值对，才会出现在列举结果中。
tagging参数与tag-key和tag-value两个参数不能同时存在。",
type: "string",
required: false,
example: ""test-key":"test-value""
}
}
],
