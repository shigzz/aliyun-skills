BatchSetCdnDomainConfig: {
summary: "调用BatchSetCdnDomainConfig进行域名批量配置",
methods: [
"get",
"post"
],
schemes: [
"http",
"https"
],
security: [
{
AK: [ ]
}
],
operationType: "write",
systemTags: {
operationType: "update",
riskType: "none",
chargeType: "free",
abilityTreeCode: "111684",
abilityTreeNodes: [
"FEATUREcdn9UE6OO"
]
},
parameters: [
{
name: "DomainNames",
in: "query",
schema: {
description: "加速域名，多个域名用半角逗号（,）分隔，注意以下配置限制：

- 一次最多传20个域名。
- 域名个数乘以 Functions个数，小于等于50。",
type: "string",
required: true,
example: "www.example.com"
}
},
{
name: "Functions",
in: "query",
schema: {
description: "功能列表，一次传入最多50条，格式如下：

- **functionName**（功能名称，必填）：可配置功能请参见[功能列表](~~388460~~)，多个参数之间用半角逗号（,）分隔。
- **argName**（参数名称，必填）：**functionName**的配置项（可配置多个配置项）。
- **argValue**（参数值，必填）：**functionName**的配置项的取值。
- **parentid**（规则条件ID，非必填）：通过配置[域名配置功能参数](~~388460~~)中的功能函数**condition**（规则引擎），可以创建出规则条件（规则条件可以通过识别用户请求中携带的各种参数来匹配和过滤用户请求），每一个规则条件被创建以后都会生成一个对应的[configid](~~388994~~)，configid可以被当作ParentId参数被其他功能函数引用，这样规则条件就可以与功能配置一起组合形成更灵活的配置。

**parentId**为 **-1**：表示删除该配置里面已有的规则条件。
```[{
   "functionArgs": [{
     "argName": "功能参数A", 
     "argValue": "功能参数A对应的值"
    }, 
  {
    "argName": "功能参数B", 
    "argValue": "功能参数B对应的值"
     }], 
 "functionName": "功能名称",
 "parentId": 选填项，对应引用规则条件的configid
}]
```
不使用**parentId**的情况下，配置示例如下：
使用函数**origin_request_header**添加回源HTTP请求头的时候引用了**configid=222728944812032**的规则条件，请求参数如下：
```[{
        "functionArgs": [{
            "argName": "header_operation_type",
            "argValue": "add"
        }, {
            "argName": "header_name",
            "argValue": "Accept-Encoding"
        }, {
            "argName": "header_value",
            "argValue": "gzip"
        }, {
            "argName": "duplicate",
            "argValue": "off"
        }],
        "functionName": "origin_request_header"
}]
```
使用**parentId**的情况下，配置示例如下：
使用函数**origin_request_header**添加回源HTTP请求头的时候引用了**configid=222728944812032**的规则条件，请求参数如下：
```[{
        "functionArgs": [{
            "argName": "header_operation_type",
            "argValue": "add"
        }, {
            "argName": "header_name",
            "argValue": "Accept-Encoding"
        }, {
            "argName": "header_value",
            "argValue": "gzip"
        }, {
            "argName": "duplicate",
            "argValue": "off"
        }],
        "functionName": "origin_request_header",
        "parentId": 222728944812032
}]
```
对一个已经使用了**parentId**的功能配置删除对**parentId**的引用，配置示例如下：
函数**origin_request_header**添加回源HTTP请求头的时候已经引用了**configid=222728944812032**的规则条件，现在要删掉对规则条件的引用，请求参数如下：
```[{
        "functionArgs": [{
            "argName": "header_operation_type",
            "argValue": "add"
        }, {
            "argName": "header_name",
            "argValue": "Accept-Encoding"
        }, {
            "argName": "header_value",
            "argValue": "gzip"
        }, {
            "argName": "duplicate",
            "argValue": "off"
        }],
        "functionName": "origin_request_header",
        "parentId": -1
}]
```",
type: "string",
required: true,
example: "[{"functionArgs": [{"argName": "key","argValue": "Content-Encoding"},{"argName": "value","argValue": "gzip"}],"functionName": "set_resp_header"} ]"
}
}
],
responses: {
200: {
schema: {
type: "object",
properties: {
RequestId: {
description: "请求ID。",
type: "string",
example: "04F0F334-1335-436C-A1D7-6C044FE73368"
},
DomainConfigList: {
type: "object",
itemNode: true,
properties: {
DomainConfigModel: {
description: "域名配置清单。",
type: "array",
items: {
type: "object",
properties: {
ConfigId: {
description: "配置ID，如果返回为0，则表示该条配置未配置成功，需要重新配置。",
type: "integer",
format: "int64",
example: "1234567"
},
DomainName: {
description: "域名。",
type: "string",
example: "www.example.com"
},
FunctionName: {
description: "功能名称。",
type: "string",
example: "set_resp_header"
}
}
}
}
}
}
}
}
}
},
