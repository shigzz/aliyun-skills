DescribeDomainCname: {
summary: "调用接口对加速域名 Cname 进行解析检测，查看解析结果判断是否完成Cname配置。",
methods: [
"get",
"post"
],
schemes: [
"http",
"https"
],
security: [
{
AK: [ ]
}
],
operationType: "read",
