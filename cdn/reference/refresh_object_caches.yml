- 同一个域名、同一秒钟提交的刷新任务（URL颗粒度）会被合并为同一个RefreshTaskId。
- 同一个域名、同一秒钟提交的刷新任务（URL颗粒度）如果超过2000条，那么会按照每2000条合并为一个RefreshTaskId的方式处理。",
