"FEATUREcdnMZ37V7"
]
},
parameters: [
{
name: "ObjectPath",
in: "formData",
schema: {
description: "- 单次提交多个URL或多个目录时，使用换行符（\n）或（\r\n）分隔。
- 单次提交的任务中所有URL的域名个数总和需要在10个以内。",
type: "string",
required: true,
example: "http://example.com/image/1.png
http://aliyundoc.com/image/2.png"
}
},
{
name: "ObjectType",
in: "formData",
schema: {
description: "刷新类型。取值范围：

- **File**（默认值）：URL。
- **Directory**：目录。
- **Regex**：正则刷新。
- **IgnoreParams**：去参数刷新。去参数指的是去除请求URL中`?`及`?`之后的参数，去参数刷新指的是用户先通过接口提交去参数后的URL，然后用户提交的待刷新URL将会与已缓存资源的URL进行去参数匹配，如果已缓存资源的URL去参数以后与待刷新URL匹配，那么CDN节点将对缓存资源执行刷新处理。

> - URL刷新和目录刷新的功能说明请参考[刷新和预热资源](~~64936~~)。
>- 文件刷新将直接删除节点上的资源，当有新请求时回源拉取新资源。其它刷新类型默认只刷新发生变更的资源，需要强制刷新请配置Force参数为true，详见Force参数说明。",
type: "string",
required: false,
example: "File",
default: "File"
}
},
{
name: "Force",
in: "formData",
schema: {
description: "是否直接删除CDN节点上的缓存。默认为false。

- **true**：直接删除CDN节点上的缓存。直接删除意味着立即将指定的缓存资源从CDN的所有节点上删除，下一个对该资源的请求将需要访问源服务器去获取最新版本的数据，然后重新进行缓存。这种方式可以确保一旦执行了删除操作后，所有后续请求都将获得最新的内容，适合于需要立即更新缓存内容的情况，例如紧急修复安全漏洞或者发布重要更新时。但需要注意的是，这可能会瞬间增加源服务器的压力，因为所有相关请求都需要访问源服务器。

- **false**：对CDN节点上的缓存标记过期。将缓存资源标记为过期之后，下一个对该资源的请求到达时，CDN节点将会回源验证该资源的最新版本，若与当前缓存资源一致，则直接返回已缓存资源，若不一致，则回源拉取新资源返回给用户，并重新缓存该资源。这种方法的好处是它允许逐渐更新缓存中的内容，而不是立即全部清除，适用于需要平滑过渡的情况，可以减少由于直接删除大量缓存而可能导致源站压力增大。

> 此参数生效范围：使用目录刷新、正则刷新、去参数刷新这三种刷新方式的时候可以生效。",
type: "boolean",
required: false,
example: "false"
}
}
],
