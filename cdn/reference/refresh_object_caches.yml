title: "刷新缓存",
description: "- 请求方式：支持POST请求，参数用form表单显示。
- 相关接口：刷新预热类接口包含[RefreshObjectCaches](~~91164~~)刷新接口和[PushObjectCache](~~91161~~)预热接口。
- 单用户调用频率：50次/秒。
- 如果您需要自动化刷新或预热，请参见[刷新预热自动化脚本](~~151829~~)。

## 注意事项
- 提交刷新任务并成功执行后，CDN节点上对应的缓存资源将会失效，当您再次发起访问请求时，节点会回源站拉取所需资源，并重新缓存在节点上，因此大批量提交刷新任务会清空较多缓存，导致回源带宽和请求突增，增加源站压力。
- 刷新任务从提交到生效，大约需要5~6分钟，如果文件或者目录配置的缓存过期时间少于5分钟，您无需执行刷新操作，等待文件或者目录缓存超时更新即可。
- 使用RAM用户来执行刷新或预热操作的，需要先获得授权，请参见[授予RAM用户刷新预热权限](~~260300~~)完成授权。

### URL刷新配额
- 默认情况下，一个账号每日最多可以提交10000条URL刷新和100个目录刷新，目录刷新包含子目录。如果您的阿里云账号的日带宽峰值大于200 Mbps，您可以参考<props="china">[配额管理](~~256513~~)</props><props="intl">[提交工单](https://account.alibabacloud.com/login/login.htm?oauth_callback=https%3A//ticket-intl.console.aliyun.com/%23/ticket/createIndex)</props>申请提升每日配额，阿里云将根据您业务的实际需求进行评估和配置。
- 默认情况下，一个账号每日最多可以提交20个正则刷新、100个去参数刷新，如果您的阿里云账号的日带宽峰值大于10 Gbps，您可以通过<props="china">[填写信息](https://page.aliyun.com/form/act2017566026/index.htm)</props><props="intl">[提交工单](https://workorder-intl.console.aliyun.com/#/ticket/createIndex)</props>来申请提升每日配额。
- 每次请求最多支持提交1000条URL刷新或者100个目录刷新或者1个正则刷新。
- 单个域名每分钟最多支持提交10000条URL刷新。"
}
